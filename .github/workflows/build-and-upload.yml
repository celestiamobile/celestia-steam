name: Build and Upload to Steam

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      upload_to_steam:
        description: 'Upload build to Steam (requires App ID + creds)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  BUILD_TYPE: RelWithDebInfo
  VCPKG_BINARY_SOURCES: 'clear;nuget,GitHub,readwrite'

jobs:
  build:
    name: "build-windows-x64"
    runs-on: windows-2025-vs2026

    steps:
    - name: Checkout celestia-steam (with submodules)
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Apply celestia-steam patches
      shell: bash
      run: scripts/apply-patches.sh

    # TODO: build steps mirroring celestia-170 (vcpkg, cmake, install) with
    # -DENABLE_STEAM=ON -DSTEAMWORKS_SDK_ROOT=${{github.workspace}}/steamworks_sdk
    # TODO: stage build output into ${{github.workspace}}/output/.
    # TODO: after install, copy fonts/ into output/fonts/ so the bundled
    # Noto fonts ship next to the binary (patch 0003 loads them from
    # "fonts/..." relative to the executable's CWD).

    - name: Upload build artifact
      uses: actions/upload-artifact@v5
      if: success()
      with:
        name: celestia-steam-build
        if-no-files-found: warn
        retention-days: 10
        path: output/

  upload-to-steam:
    name: "Upload to SteamPipe"
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_to_steam == 'true' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout celestia-steam
      uses: actions/checkout@v6

    - name: Download build artifact
      uses: actions/download-artifact@v5
      with:
        name: celestia-steam-build
        path: content

    - name: Install SteamCMD
      run: |
        sudo apt-get update
        sudo apt-get install -y lib32gcc-s1
        mkdir -p ~/steamcmd
        cd ~/steamcmd
        curl -sqL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz | tar zxvf -

    # TODO: configure Steam Guard via STEAM_CONFIG_VDF secret (base64-encoded
    # config.vdf from a previously authenticated session).
    # TODO: replace placeholders in steampipe/*.vdf with real App/Depot IDs
    # from repository secrets before invoking steamcmd.

    - name: Upload via SteamPipe
      env:
        STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
      run: |
        ~/steamcmd/steamcmd.sh \
          +login "$STEAM_USERNAME" "$STEAM_PASSWORD" \
          +run_app_build "${{github.workspace}}/steampipe/app_build.vdf" \
          +quit

name: Build and Upload to Steam

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      upload_to_steam:
        description: 'Upload build to Steam (requires App ID + creds)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  BUILD_TYPE: RelWithDebInfo
  VCPKG_BINARY_SOURCES: 'clear;nuget,GitHub,readwrite'

jobs:
  build:
    name: "build-windows-x64"
    runs-on: windows-2025-vs2026
    permissions:
      contents: read
      packages: write

    steps:
    - name: Disable Git line-ending conversion
      shell: bash
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf

    - name: Checkout celestia-steam (with submodules)
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Apply celestia-steam patches
      shell: bash
      run: scripts/apply-patches.sh

    - name: Update vcpkg
      shell: pwsh
      run: |
        $vcpkgCommit = '99a97de2cb371449d4fb9dc970f2ac562d689ec2'
        pushd "$env:VCPKG_INSTALLATION_ROOT"
        git fetch origin $vcpkgCommit
        git reset --hard $vcpkgCommit
        ./bootstrap-vcpkg.bat
        ./vcpkg.exe integrate install
        popd

    - name: Setup NuGet credentials
      shell: pwsh
      run: |
        $nugetCmd = vcpkg fetch nuget | Select-Object -Last 1
        $nugetSource = 'https://nuget.pkg.github.com/celestiamobile/index.json'
        & "$nugetCmd" sources add `
          -Source "$nugetSource" `
          -StorePasswordInClearText `
          -Name "GitHub" `
          -Username 'celestiamobile' `
          -Password '${{secrets.GITHUB_TOKEN}}'

    - name: Find ImageMagick
      shell: pwsh
      run: |
        $magickDir = $null
        foreach ($root in @("C:\Program Files", "C:\Program Files (x86)", "C:\Tools", "C:\ProgramData\chocolatey\lib")) {
          $found = Get-ChildItem "$root\ImageMagick*" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($found) { $magickDir = $found.FullName; break }
        }
        if (-not $magickDir) {
          $magickExe = (Get-Command magick -ErrorAction SilentlyContinue).Source
          if ($magickExe) { $magickDir = Split-Path $magickExe }
        }
        if (-not $magickDir) {
          Write-Host "ImageMagick not found, installing..."
          choco install imagemagick -y
          refreshenv
          $magickExe = (Get-Command magick -ErrorAction SilentlyContinue).Source
          if ($magickExe) { $magickDir = Split-Path $magickExe }
        }
        Write-Host "ImageMagick dir: $magickDir"
        if ($magickDir) {
          echo "$magickDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "ImageMagick_HOME=$magickDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } else {
          Write-Error "Failed to locate ImageMagick"; exit 1
        }

    - name: Install dependencies
      shell: pwsh
      run: |
        $packages = @(
          'boost-container',
          'boost-container-hash',
          'boost-smart-ptr',
          'eigen3',
          'ffmpeg[core,avcodec,avformat,gpl,swscale,x264]',
          'fmt',
          'freetype',
          'gettext[tools]',
          'gperf',
          'libepoxy',
          'libjpeg-turbo',
          'libpng',
          'luajit',
          'qtbase[core,opengl,widgets,freetype,harfbuzz,jpeg,png]'
        )

        $triplet = 'x64-windows-release'
        pushd "$env:VCPKG_INSTALLATION_ROOT"
        ./vcpkg.exe --overlay-triplets=${{github.workspace}}/celestia/windows/vcpkg-triplets `
                    --triplet="$triplet" `
                    --host-triplet="$triplet" `
                    install --recurse @packages
        popd

    - name: Configure CMake
      shell: pwsh
      run: |
        $triplet = 'x64-windows-release'
        cmake -B '${{github.workspace}}/build' `
              -S '${{github.workspace}}/celestia' `
              -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
              -DVCPKG_OVERLAY_TRIPLETS="${{github.workspace}}/celestia/windows/vcpkg-triplets" `
              -DVCPKG_TARGET_TRIPLET="$triplet" `
              -DCMAKE_GENERATOR_PLATFORM='x64' `
              -DCMAKE_INSTALL_PREFIX="${{github.workspace}}/install" `
              -DENABLE_SPICE=OFF        `
              -DENABLE_TOOLS=OFF        `
              -DENABLE_TESTS=ON         `
              -DENABLE_SDL=OFF          `
              -DENABLE_QT5=OFF          `
              -DENABLE_WIN=OFF          `
              -DENABLE_QT6=ON           `
              -DENABLE_FFMPEG=ON        `
              -DENABLE_MINIAUDIO=ON     `
              -DENABLE_LTO=ON           `
              -DENABLE_STEAM=ON         `
              -DSTEAMWORKS_SDK_ROOT="${{github.workspace}}/steamworks_sdk" `
              -DUSE_ICU=ON              `
              -DUSE_WIN_ICU=ON

    - name: Build
      shell: pwsh
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} '--' /maxcpucount:2 /nologo

    - name: Test
      shell: pwsh
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}}

    - name: Install Celestia and Qt6 frontend
      shell: pwsh
      run: |
        cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --component core
        cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --component qt6gui

    - name: Install CelestiaContent
      shell: pwsh
      run: |
        $triplet = 'x64-windows-release'
        cmake -S ${{github.workspace}}/content -B ${{github.workspace}}/content/build `
              -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
              -DVCPKG_OVERLAY_TRIPLETS="${{github.workspace}}/celestia/windows/vcpkg-triplets" `
              -DVCPKG_TARGET_TRIPLET="$triplet" `
              -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/install `
              -DImageMagick_magick_EXECUTABLE="$env:ImageMagick_HOME/magick.exe" `
              -DImageMagick_convert_EXECUTABLE="$env:ImageMagick_HOME/magick.exe" `
              -DImageMagick_identify_EXECUTABLE="$env:ImageMagick_HOME/magick.exe"
        cmake --build ${{github.workspace}}/content/build --config ${{env.BUILD_TYPE}} --target install

    - name: Run windeployqt
      shell: pwsh
      run: |
        $triplet = 'x64-windows-release'
        $windeployqt = "$env:VCPKG_INSTALLATION_ROOT/installed/$triplet/tools/Qt6/bin/windeployqt.exe"
        & $windeployqt "${{github.workspace}}/install/celestia-qt6.exe"

    - name: Deploy bundled Noto fonts
      shell: pwsh
      run: |
        $dest = "${{github.workspace}}/install/fonts"
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Copy-Item -Path "${{github.workspace}}/fonts/*" -Destination $dest -Force

    - name: Stage SteamPipe content
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "${{github.workspace}}/output" | Out-Null
        Copy-Item -Path "${{github.workspace}}/install/*" `
                  -Destination "${{github.workspace}}/output/" `
                  -Recurse -Force

    - name: Upload build artifact
      uses: actions/upload-artifact@v5
      if: success()
      with:
        name: celestia-steam-build
        if-no-files-found: error
        retention-days: 10
        path: output/

  upload-to-steam:
    name: "Upload to SteamPipe"
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_to_steam == 'true' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout celestia-steam
      uses: actions/checkout@v6

    - name: Download build artifact
      uses: actions/download-artifact@v5
      with:
        name: celestia-steam-build
        path: content

    - name: Install SteamCMD
      run: |
        sudo apt-get update
        sudo apt-get install -y lib32gcc-s1
        mkdir -p ~/steamcmd
        cd ~/steamcmd
        curl -sqL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz | tar zxvf -

    - name: Restore Steam Guard session
      env:
        STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
      run: |
        # Decode the previously-authenticated config.vdf into both Steam
        # config locations on Linux. Different steamcmd builds look in
        # different places; writing to both is the safest pattern.
        mkdir -p ~/Steam/config ~/.steam/steam/config
        echo "$STEAM_CONFIG_VDF" | base64 -d > ~/Steam/config/config.vdf
        cp ~/Steam/config/config.vdf ~/.steam/steam/config/config.vdf
        chmod 600 ~/Steam/config/config.vdf ~/.steam/steam/config/config.vdf

    - name: Upload via SteamPipe
      env:
        STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
      run: |
        ~/steamcmd/steamcmd.sh \
          +login "$STEAM_USERNAME" "$STEAM_PASSWORD" \
          +run_app_build "${{github.workspace}}/steampipe/app_build.vdf" \
          +quit

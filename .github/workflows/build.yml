name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  BUILD_TYPE: RelWithDebInfo
  VCPKG_BINARY_SOURCES: 'clear;nuget,GitHub,readwrite'

jobs:
  build:
    name: "build-windows-x64"
    runs-on: windows-2025-vs2026
    permissions:
      contents: read
      packages: write

    env:
      # Job-level so the upload step's `if:` can read it (a step cannot
      # reliably reference its own step-level env in its `if`). sentry-cli
      # also picks these up automatically at runtime.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: celestia-for-steam
      SENTRY_PROJECT: native-qt

    steps:
    - name: Disable Git line-ending conversion
      shell: bash
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf

    - name: Checkout celestia-steam (with submodules)
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Update vcpkg
      shell: pwsh
      run: |
        $vcpkgCommit = 'f9ffbaa46ad8e284b2b74919f7e0ba259564d424'
        pushd "$env:VCPKG_INSTALLATION_ROOT"
        git fetch origin $vcpkgCommit
        git reset --hard $vcpkgCommit
        ./bootstrap-vcpkg.bat
        ./vcpkg.exe integrate install
        popd

    - name: Setup NuGet credentials
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Write NuGet.Config to the per-user location so every nuget.exe
        # instance on the runner picks up the same credentials. Auth is
        # then handled at the feed level; package-level conflicts are
        # avoided by using the celestia-steam-specific triplet name (see
        # triplets/x64-windows-release-steam.cmake).
        $userConfig = "$env:APPDATA\NuGet\NuGet.Config"
        New-Item -ItemType Directory -Force -Path (Split-Path $userConfig) | Out-Null
        $token = $env:GITHUB_TOKEN
        $configXml = @"
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <add key="GitHub" value="https://nuget.pkg.github.com/celestiamobile/index.json" />
          </packageSources>
          <packageSourceCredentials>
            <GitHub>
              <add key="Username" value="celestiamobile" />
              <add key="ClearTextPassword" value="$token" />
            </GitHub>
          </packageSourceCredentials>
        </configuration>
        "@
        [System.IO.File]::WriteAllText($userConfig, $configXml, [System.Text.UTF8Encoding]::new($false))

    - name: Find ImageMagick
      shell: pwsh
      run: |
        $magickDir = $null
        foreach ($root in @("C:\Program Files", "C:\Program Files (x86)", "C:\Tools", "C:\ProgramData\chocolatey\lib")) {
          $found = Get-ChildItem "$root\ImageMagick*" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($found) { $magickDir = $found.FullName; break }
        }
        if (-not $magickDir) {
          $magickExe = (Get-Command magick -ErrorAction SilentlyContinue).Source
          if ($magickExe) { $magickDir = Split-Path $magickExe }
        }
        if (-not $magickDir) {
          Write-Host "ImageMagick not found, installing..."
          choco install imagemagick -y
          refreshenv
          $magickExe = (Get-Command magick -ErrorAction SilentlyContinue).Source
          if ($magickExe) { $magickDir = Split-Path $magickExe }
        }
        Write-Host "ImageMagick dir: $magickDir"
        if ($magickDir) {
          echo "$magickDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "ImageMagick_HOME=$magickDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } else {
          Write-Error "Failed to locate ImageMagick"; exit 1
        }

    - name: Install dependencies
      shell: pwsh
      run: |
        $packages = @(
          'boost-container',
          'boost-container-hash',
          'boost-smart-ptr',
          'eigen3',
          'ffmpeg[core,avcodec,avformat,gpl,swscale,x264]',
          'fmt',
          'freetype',
          'gettext[tools]',
          'gperf',
          'icu',
          'libepoxy',
          'libjpeg-turbo',
          'libpng',
          'luajit',
          'qtbase[core,opengl,widgets,freetype,harfbuzz,jpeg,png,windeployqt,icu]'
        )

        # The celestia-steam-specific triplet keeps our NuGet packages
        # under a distinct name from celestia-170's (otherwise the cache
        # push 403s because celestia-170 owns the packages).
        $triplet = 'x64-windows-release-steam'
        pushd "$env:VCPKG_INSTALLATION_ROOT"
        ./vcpkg.exe --overlay-triplets=${{github.workspace}}/celestia/windows/vcpkg-triplets `
                    --overlay-triplets=${{github.workspace}}/triplets `
                    --triplet="$triplet" `
                    --host-triplet="$triplet" `
                    install --recurse @packages
        popd

    - name: Build Sentry SDK
      shell: pwsh
      run: |
        # Build sentry-native from the pinned submodule with the crashpad
        # backend and Qt integration (the vcpkg port does not expose the Qt
        # integration, so we build it from source). It is pointed at vcpkg's
        # Qt6 via CMAKE_PREFIX_PATH, and installed to a prefix that the main
        # Celestia configure step consumes via sentry_DIR.
        $triplet = 'x64-windows-release-steam'
        $qtPrefix = "$env:VCPKG_INSTALLATION_ROOT/installed/$triplet"
        cmake -S '${{github.workspace}}/sentry-native' `
              -B '${{github.workspace}}/sentry-build' `
              -DCMAKE_GENERATOR_PLATFORM='x64' `
              -DSENTRY_BACKEND=crashpad `
              -DSENTRY_INTEGRATION_QT=YES `
              -DSENTRY_BUILD_SHARED_LIBS=ON `
              -DSENTRY_BUILD_TESTS=OFF `
              -DSENTRY_BUILD_EXAMPLES=OFF `
              -DCMAKE_PREFIX_PATH="$qtPrefix" `
              -DCMAKE_INSTALL_PREFIX="${{github.workspace}}/sentry-install"
        cmake --build '${{github.workspace}}/sentry-build' --config ${{env.BUILD_TYPE}}
        cmake --install '${{github.workspace}}/sentry-build' --config ${{env.BUILD_TYPE}}

    - name: Configure CMake
      shell: pwsh
      run: |
        $triplet = 'x64-windows-release-steam'
        cmake -B '${{github.workspace}}/build' `
              -S '${{github.workspace}}/celestia' `
              -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
              -DVCPKG_OVERLAY_TRIPLETS="${{github.workspace}}/celestia/windows/vcpkg-triplets;${{github.workspace}}/triplets" `
              -DVCPKG_TARGET_TRIPLET="$triplet" `
              -DCMAKE_GENERATOR_PLATFORM='x64' `
              -DCMAKE_INSTALL_PREFIX="${{github.workspace}}/install" `
              -DENABLE_SPICE=OFF        `
              -DENABLE_TOOLS=OFF        `
              -DENABLE_TESTS=ON         `
              -DENABLE_SDL=OFF          `
              -DENABLE_QT5=OFF          `
              -DENABLE_WIN=OFF          `
              -DENABLE_QT6=ON           `
              -DENABLE_FFMPEG=ON        `
              -DENABLE_MINIAUDIO=ON     `
              -DENABLE_LTO=ON           `
              -DENABLE_STEAM=ON         `
              -DSTEAMWORKS_SDK_ROOT="${{github.workspace}}/steamworks_sdk" `
              -DENABLE_SENTRY=ON        `
              -DSENTRY_DSN="${{ secrets.SENTRY_DSN }}" `
              -DSENTRY_BUILD_NUMBER="${{ github.run_number }}" `
              -Dsentry_DIR="${{github.workspace}}/sentry-install/lib/cmake/sentry" `
              -DUSE_ICU=ON              `
              -DUSE_WIN_ICU=OFF

    - name: Build
      shell: pwsh
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} '--' /maxcpucount:2 /nologo

    - name: Test
      shell: pwsh
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}}

    - name: Install Celestia and Qt6 frontend
      shell: pwsh
      run: |
        cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --component core
        cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --component qt6gui

    - name: Install CelestiaContent
      shell: pwsh
      run: |
        $triplet = 'x64-windows-release-steam'
        cmake -S ${{github.workspace}}/content -B ${{github.workspace}}/content/build `
              -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
              -DVCPKG_OVERLAY_TRIPLETS="${{github.workspace}}/celestia/windows/vcpkg-triplets;${{github.workspace}}/triplets" `
              -DVCPKG_TARGET_TRIPLET="$triplet" `
              -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/install `
              -DImageMagick_magick_EXECUTABLE="$env:ImageMagick_HOME/magick.exe" `
              -DImageMagick_convert_EXECUTABLE="$env:ImageMagick_HOME/magick.exe" `
              -DImageMagick_identify_EXECUTABLE="$env:ImageMagick_HOME/magick.exe"
        cmake --build ${{github.workspace}}/content/build --config ${{env.BUILD_TYPE}} --target install

    - name: Run windeployqt
      shell: pwsh
      run: |
        $triplet = 'x64-windows-release-steam'
        $windeployqt = "$env:VCPKG_INSTALLATION_ROOT/installed/$triplet/tools/Qt6/bin/windeployqt.exe"
        & $windeployqt "${{github.workspace}}/install/celestia-qt6.exe"

    - name: Stage SteamPipe content
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "${{github.workspace}}/output" | Out-Null
        Copy-Item -Path "${{github.workspace}}/install/*" `
                  -Destination "${{github.workspace}}/output/" `
                  -Recurse -Force

    - name: Upload debug symbols to Sentry
      shell: pwsh
      if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
      run: |
        # Upload every EXE/DLL/PDB so crashes in our code and in bundled
        # dependencies symbolicate. sentry-cli scans recursively and pairs each
        # binary with its PDB by debug-id, so we point it at the build trees
        # (our PDBs + sentry/crashpad PDBs) and the deployed runtime.
        npm install -g @sentry/cli
        sentry-cli debug-files upload --include-sources `
          "${{github.workspace}}/build" `
          "${{github.workspace}}/sentry-build" `
          "${{github.workspace}}/output"

    - name: Upload build artifact
      uses: actions/upload-artifact@v5
      if: success()
      with:
        name: celestia-steam-build
        if-no-files-found: error
        retention-days: 10
        path: output/

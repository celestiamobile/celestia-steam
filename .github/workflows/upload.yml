name: Upload to Steam

# Manual-only: pushes a previously-built artifact to SteamPipe via the
# game-ci/steam-deploy action. Pick a specific Build run by ID, or leave
# the input blank to use the latest successful Build run.
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Build run ID (leave empty for latest successful Build run)'
        required: false
        default: ''
      release_branch:
        description: 'Steam branch to set live (empty = leave on default, do not auto-promote)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  upload:
    name: "Upload to SteamPipe"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
    - name: Checkout celestia-steam
      uses: actions/checkout@v6

    - name: Resolve Build run ID
      id: resolve_run
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        if [ -n "${{ inputs.run_id }}" ]; then
          RUN_ID='${{ inputs.run_id }}'
          echo "Using explicitly provided run ID: $RUN_ID"
        else
          RUN_ID=$(gh run list \
            --workflow=build.yml \
            --repo ${{ github.repository }} \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "Resolved latest successful Build run: $RUN_ID"
        fi
        if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
          echo "::error::Could not determine a Build run ID — has Build ever succeeded?"
          exit 1
        fi
        echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

    - name: Download build artifact
      uses: actions/download-artifact@v5
      with:
        name: celestia-steam-build
        path: content
        run-id: ${{ steps.resolve_run.outputs.run_id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to Steam
      uses: game-ci/steam-deploy@v3
      with:
        username: ${{ secrets.STEAM_USERNAME }}
        configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
        appId: '4753420'
        buildDescription: 'celestia-steam build ${{ steps.resolve_run.outputs.run_id }} (${{ github.sha }})'
        rootPath: content
        depot1Path: '.'
        releaseBranch: ${{ inputs.release_branch }}
